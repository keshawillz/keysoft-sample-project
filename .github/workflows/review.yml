name: Claude review

# Thursday's challenge: finish this workflow so Claude Code reviews each pull
# request against the house style in CLAUDE.md and posts its findings.
#
# Prerequisite: add your key as a repo secret named ANTHROPIC_API_KEY
# (Settings -> Secrets and variables -> Actions -> New repository secret).

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install -g @anthropic-ai/claude-code

      - name: Review the diff
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # The -p (print) flag runs Claude Code non-interactively — without it the
          # job would hang waiting for input. Capture the PR diff and review it.
          git diff "origin/${{ github.base_ref }}...HEAD" > pr.diff

          # TODO (Thursday): call your review skill instead of this inline prompt,
          # and post the findings as inline PR comments (e.g. via the gh CLI).
          claude -p "Review pr.diff against the house style in CLAUDE.md. \
            Return findings as JSON: [{file, line, issue}]." \
            --output-format json > findings.json || true

          echo "----- findings -----"
          cat findings.json
